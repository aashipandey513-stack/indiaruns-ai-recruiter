# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"

ai_usage_summary: |
  Used Gemini for architectural discussion, refining the deterministic business logic rules, and debugging Python data-processing constraints to ensure the ranking engine runs within the strict 5-minute CPU limit. No candidate data was fed to any LLM during the actual ranking process.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Hybrid AI ranking system using Sentence-Transformer embeddings (all-MiniLM-L6-v2) for semantic job-candidate matching. A post-processing deterministic Python rules engine applies strict heuristic multipliers (e.g., penalizing consulting-only history and irrelevant non-engineering job titles) to enforce high-signal hiring quality as defined by the JD. A behavioral multiplier derived from Recruiter Response Rate adjusts scores to favor truly available candidates. Optimized for batched CPU inference, achieving end-to-end ranking for 100K profiles in under 5 minutes.

